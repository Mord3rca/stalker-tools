on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    name: 'Building, basic UTest and memcheck tests'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Install deps
        run: sudo apt install valgrind
      - name: Building
        run: ./build.sh
      - name: Test simple.ltx
        run: .github/scripts/basic-utest.sh simple.ltx 299566254b1f130dee3e385c193db85d
      - name: Test dirty.ltx
        run: .github/scripts/basic-utest.sh dirty.ltx 1385323664c19f37f557045aff5ebf90
      - name: Test case.ltx
        run: .github/scripts/basic-utest.sh case.ltx 2ac2cf8a2720e0481e5c1d4401c5fa61
      - name: Test inheritance.ltx
        run: .github/scripts/basic-utest.sh inheritance.ltx aa1983acc36bcf804812618a2074aaea
      - name: Test override.ltx
        run: .github/scripts/basic-utest.sh override.ltx 885ebd029102b01ad15fd3fea671e61d
      - name: Test override-first.ltx
        run: .github/scripts/basic-utest.sh override-first.ltx 5b6c3244fa22ee968deda055ca415376
      - name: Test override-safe.ltx
        run: .github/scripts/basic-utest.sh override-safe.ltx c9b6d91ab0b4960f7e612ce8d972ae82
      - name: Test deletion.ltx
        run: .github/scripts/basic-utest.sh deletion.ltx 48810c0b253e184c644f52c98afb98de
      - name: Test glob.ltx
        run: .github/scripts/basic-utest.sh glob.ltx d93930a3f1185173639710ba7a17cf1c
