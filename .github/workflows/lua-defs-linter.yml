
on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    name: 'LUA Definition Linter'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Build Docker image
        run: docker build -t lua-linter .github/lua-defs-linter
      - name: Run linter
        run: docker run -v "${PWD}:/work" -w /work lua-linter
